<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>BeatScore</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/album.css">
</head>
<body>

<div class="navbar">
  <a href="../index.html" class="logo">BeatScore</a>
</div>

<div class="container">

  <div class="album-header">
    <img class="album-cover">
    <div>
      <h1></h1>
      <p class="artist"></p>
      <p class="rating"></p>
      <p class="description"></p>

      <button onclick="favoriteAlbum()">⭐ Favoritar</button>
    </div>
  </div>

  <div class="review-form">
    <h3>Adicionar review</h3>
    <textarea id="reviewText"></textarea>
    <button onclick="addReview()">Enviar</button>
  </div>

  <div class="reviews"></div>

</div>

<script src="../js/album.js"></script>
</body>
</html>
